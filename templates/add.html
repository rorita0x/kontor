{{define "title"}}Entry hinzufügen{{end}}

{{define "content"}}
<div
        class="container"
        hx-ext="alpine-interop"
            x-data='{
                    tags: {{ toJSON .tags }},
                    symbols: {{ toJSON .symbols }},
                    assetClasses: {{ toJSON .assetClasses }},
                    replaceTags(data, elt) { this.tags = data; },
                    replaceSymbols(data, elt) { this.symbols = data; },
                    replaceAssetClasses(data, elt) { this.assetClasses = data; },

                    selectedTags: {{ if .trade }}{{ toJSON .trade.Tags }}{{ else }}[]{{ end }},
                    isSelected(tag) { return this.selectedTags.includes(tag); },
                    selectedSymbol: {{ if .trade }}{{ toJSON .trade.Symbol }}{{ else }}""{{ end }},

                    exits: {{ if .trade }}{{ toJSON .trade.Exits }}{{ else }}[]{{ end }},
                    addExit() { this.exits.push({ date: "", price: "", qty: "" }); },
                    removeExit(i) { this.exits.splice(i, 1); },

                    accountSize: {{ .accountSize }},
                    traded: {{ if .trade }}{{ toJSON .trade.Traded }}{{ else }}""{{ end }},
                    entryPrice: {{ if .trade }}{{ .trade.EntryPrice }}{{ else }}0{{ end }},
                    stopLoss: {{ if .trade }}{{ .trade.StopLoss }}{{ else }}0{{ end }},
                    quantity: {{ if .trade }}{{ .trade.Quantity }}{{ else }}0{{ end }},
                    positionValue: {{ if .trade }}{{ .trade.PositionValue }}{{ else }}0{{ end }},

                    syncFromQty() {
                        if (this.entryPrice > 0) this.positionValue = +(this.quantity * this.entryPrice).toFixed(2);
                    },
                    syncFromValue() {
                        if (this.entryPrice > 0) this.quantity = +(this.positionValue / this.entryPrice).toFixed(8);
                    },
                    onEntryChange() {
                        // Entry hat sich geändert: Positionswert aus Stückzahl neu ableiten (Menge bleibt führend)
                        if (this.quantity > 0) this.syncFromQty();
                        else this.syncFromValue();
                    },
                    get effectiveQty() {
                        if (this.quantity > 0) return this.quantity;
                        if (this.positionValue > 0 && this.entryPrice > 0) return this.positionValue / this.entryPrice;
                        return 0;
                    },
                    get signedDiff() {
                        // positiv = Stop in Verlustrichtung; negativ = Stop im Gewinn
                        return this.traded === "short"
                            ? this.stopLoss - this.entryPrice
                            : this.entryPrice - this.stopLoss;
                    },
                    get riskAmount() {
                        const q = this.effectiveQty;
                        if (q <= 0 || this.entryPrice <= 0 || this.stopLoss <= 0) return 0;
                        return q * this.signedDiff;
                    },
                    get riskPercent() {
                        if (this.accountSize <= 0) return 0;
                        return this.riskAmount / this.accountSize * 100;
                    },
            }'
>
    <form
            method="POST"
            action="/insert"
            enctype="multipart/form-data"
    >
        {{ if .trade }}
        <input type="hidden" name="id" value="{{ .trade.Pk }}" />
        {{ end }}

        <!-- Symbol -->
        <label for="symbol">Asset</label>
        <select id="symbol" name="symbol" class="form-select" required>
            <option value="">---</option>
            <template x-for="symbol in symbols">
                <option
                        x-text="symbol"
                        :selected="symbol === selectedSymbol">
                </option>
            </template>
        </select>

        <!-- Traded -->
        <div class="mt-2">
            <label for="traded">Trade</label>
            <select id="traded" name="traded" class="form-select" required x-model="traded">
                <option value="" {{ if not .trade }}selected{{ end }}>-- Bitte ausfüllen --</option>
                <option value="skip"  {{ if and .trade (eq .trade.Traded "skip") }}selected{{ end }}>Skip</option>
                <option value="long"  {{ if and .trade (eq .trade.Traded "long") }}selected{{ end }}>Long</option>
                <option value="short" {{ if and .trade (eq .trade.Traded "short") }}selected{{ end }}>Short</option>
            </select>
        </div>

        <!-- Result -->
        <label class="mt-2" for="result">Ergebnis</label>
        <select id="result" name="result" class="form-select" required>
            <option value="" {{ if not .trade }}selected{{ end }}>-- Bitte ausfüllen --</option>
            <option value="not finished" {{ if and .trade (eq .trade.Result "not finished") }}selected{{ end }}>Not Finished</option>
            <option value="skip"         {{ if and .trade (eq .trade.Result "skip") }}selected{{ end }}>Skip</option>
            <option value="win"          {{ if and .trade (eq .trade.Result "win") }}selected{{ end }}>Win</option>
            <option value="loss"         {{ if and .trade (eq .trade.Result "loss") }}selected{{ end }}>Loss</option>
            <option value="break-even"   {{ if and .trade (eq .trade.Result "break-even") }}selected{{ end }}>Break-Even</option>
        </select>

        <!-- Entry + Stoploss -->
        <div class="row mt-2">
            <div class="col-6">
                <label for="entryPrice">Entry Preis</label>
                <input name="entryPrice" id="entryPrice" class="form-control"
                       type="number" step="any" min="0"
                       x-model.number="entryPrice" @input="onEntryChange()">
            </div>
            <div class="col-6">
                <label for="stopLoss">Stoploss Preis</label>
                <input name="stopLoss" id="stopLoss" class="form-control"
                       type="number" step="any" min="0"
                       x-model.number="stopLoss">
            </div>
        </div>

        <!-- Positionsgröße: Stückzahl ODER Positionswert (eines reicht) -->
        <div class="row mt-2">
            <div class="col-6">
                <label for="quantity">Stückzahl (Units)</label>
                <input name="quantity" id="quantity" class="form-control"
                       type="number" step="any" min="0" placeholder="z.B. 0.5 BTC / 100 Aktien"
                       x-model.number="quantity" @input="syncFromQty()">
            </div>
            <div class="col-6">
                <label for="positionValue">Positionswert (Notional)</label>
                <input name="positionValue" id="positionValue" class="form-control"
                       type="number" step="any" min="0" placeholder="Gesamt-Exposure in Kontowährung"
                       x-model.number="positionValue" @input="syncFromValue()">
            </div>
        </div>

        <!-- Live-Risiko-Vorschau -->
        <div class="mt-2 p-2 border border-secondary rounded-2" x-show="riskAmount != 0">
            <template x-if="riskAmount > 0">
                <span>
                    Geschätztes Risiko:
                    <b x-text="riskAmount.toFixed(2)"></b> &euro;
                    <template x-if="accountSize > 0">
                        <span>(<b x-text="riskPercent.toFixed(2)"></b> % vom Konto)</span>
                    </template>
                    <template x-if="accountSize <= 0">
                        <span class="text-secondary">— Kontogröße auf der Startseite setzen für %-Anzeige</span>
                    </template>
                </span>
            </template>
            <template x-if="riskAmount < 0">
                <span class="text-success">
                    Kein Risiko — Stop liegt im Gewinn (gesicherter Gewinn:
                    <b x-text="(-riskAmount).toFixed(2)"></b> &euro;<template x-if="accountSize > 0"><span>, <b x-text="(-riskPercent).toFixed(2)"></b> % freies Risiko-Budget</span></template>)
                </span>
            </template>
        </div>

        <!-- Exits -->
        <div class="mt-3">
            <label>Exits</label>
            <template x-for="(exit, i) in exits" :key="i">
                <div class="d-flex gap-2 align-items-center mb-2">
                    <input class="form-control" type="date" x-model="exits[i].date">
                    <input class="form-control" type="number" step="any" min="0"
                           x-model="exits[i].price" placeholder="Preis">
                    <input class="form-control" type="number" step="1" min="0" max="100"
                           x-model="exits[i].qty" placeholder="% der Position">
                    <button type="button" class="btn btn-danger btn-sm flex-shrink-0" @click="removeExit(i)">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>
            </template>
            <button type="button" class="btn btn-outline-light btn-sm mt-1" @click="addExit()">
                + Exit hinzufügen
            </button>
            <input type="hidden" name="exitsJSON" :value="JSON.stringify(exits)">
        </div>


        <!-- Screenshots -->
        <div class="my-3">
            <label for="files" class="form-label">Screenshots</label>

            <div class="d-flex gap-3 mb-3">
                {{ if and .trade .trade.Screenshots }}
                {{ range $i, $img := .trade.Screenshots }}
                <div class="position-relative">
                    <input style="display: none;" type="checkbox" class="hide-label-if-checked" name="screenshots[]" id="screenshot-{{$i}}" value="{{.}}" checked />

                    <a class="d-flex" target="_blank" href="/files/{{.}}" data-fslightbox="screenshots">
                        <img class="screenshot img-thumbnail" src="/files/{{.}}" />
                    </a>

                    <label for="screenshot-{{$i}}" class="btn btn-danger btn-sm rounded-0 position-absolute top-0 opacity-75 cursor-warning" type="button" data-toggle="tooltip" data-placement="top" title="Delete"><i class="fa fa-trash"></i></label>
                </div>
                {{ end }}
                {{ end }}
            </div>

            <input class="form-control form-control-lg" name="files" id="files" type="file" multiple>
        </div>

        <!-- Notes -->
        <div class="my-3">
            <label for="notes" class="form-label">Notiz</label>
            <textarea class="form-control" name="notes" id="notes">{{ if .trade }}{{ .trade.Notes }}{{ end }}</textarea>
        </div>

        <!-- Tags -->
        <div class="d-flex flex-wrap gap-2" id="tags">
            <template x-for="tag in tags" :key="tag">
                <div>
                    <input type="checkbox" class="btn-check" :id="`tags-${tag}`" name="tags[]" :value="tag"
                           autocomplete="off"
                           :checked="isSelected(tag)">
                    <label class="btn btn-outline-light btn-sm" :for="`tags-${tag}`" x-text="tag"></label>
                </div>
            </template>
        </div>

        <button class="btn btn-primary mt-3" type="submit">{{ if .trade }}Speichern{{else}}Hinzufügen{{ end }}</button>
    </form>

    <!-- Tag / Symbol Management -->
    <div class="row justify-content-between mt-4">
        <div class="col-12 col-md-2">
            <form
                    class="me-4"
                    method="post"
                    action="/add-tag"
                    hx-post="/add-tag"
                    hx-handle-json="replaceTags"
                    hx-on::after-request="if(event.detail.successful) this.reset()">

                <input required placeholder="Tag Title" class="form-control" type="text" name="Title" />

                <button class="btn btn-light mt-3" type="submit">Add Tag</button>
            </form>
        </div>
        <div class="col-12 col-md-10">
            <form
                    method="post"
                    action="/remove-tag"
                    hx-post="/remove-tag"
                    hx-handle-json="replaceTags"
            >

                <div class="d-flex flex-wrap gap-2" id="rm-tags">
                    <template x-for="tag in tags" :key="tag">
                        <div>
                            <input type="radio" class="btn-check" :id="`rmtags-${tag}`" name="Title" :value="`${tag}`" autocomplete="off">
                            <label class="btn btn-outline-light btn-sm" :for="`rmtags-${tag}`" x-text="tag"></label>
                        </div>
                    </template>
                </div>
                <button class="btn btn-danger mt-3" type="submit">Remove Tag</button>
            </form>
        </div>
    </div>
    <div class="row justify-content-between">
        <div class="col-12 col-md-2">
            <form
                    class="me-4"
                    method="post"
                    action="/add-symbol"
                    hx-post="/add-symbol"
                    hx-handle-json="replaceSymbols"
                    hx-on::after-request="if(event.detail.successful) this.reset()">

                <input required placeholder="Asset Symbol" class="form-control" type="text" name="Symbol" />

                <select name="assetClass" class="form-select mt-2">
                    <option value="">Keine Klasse</option>
                    <template x-for="cls in assetClasses">
                        <option :value="cls" x-text="cls"></option>
                    </template>
                </select>

                <button class="btn btn-light mt-3" type="submit">Add Asset</button>
            </form>
        </div>
        <div class="col-12 col-md-10">
            <form
                    method="post"
                    action="/remove-symbol"
                    hx-post="/remove-symbol"
                    hx-handle-json="replaceSymbols"
            >

                <div class="d-flex flex-wrap gap-2" id="rm-symbols">
                    <template x-for="tag in symbols" :key="tag">
                        <div>
                            <input type="radio" class="btn-check" :id="`rmtags-${tag}`" name="Symbol" :value="`${tag}`" autocomplete="off">
                            <label class="btn btn-outline-light btn-sm" :for="`rmtags-${tag}`" x-text="tag"></label>
                        </div>
                    </template>
                </div>
                <button class="btn btn-danger mt-3" type="submit">Remove Asset</button>
            </form>
        </div>
    </div>

    <!-- Asset Class Management -->
    <div class="row justify-content-between mt-2">
        <div class="col-12 col-md-2">
            <form
                    class="me-4"
                    method="post"
                    action="/add-asset-class"
                    hx-post="/add-asset-class"
                    hx-handle-json="replaceAssetClasses"
                    hx-on::after-request="if(event.detail.successful) this.reset()">

                <input required placeholder="Klassen-Name" class="form-control" type="text" name="Title" />

                <button class="btn btn-light mt-3" type="submit">Add Asset Class</button>
            </form>
        </div>
        <div class="col-12 col-md-10">
            <form
                    method="post"
                    action="/remove-asset-class"
                    hx-post="/remove-asset-class"
                    hx-handle-json="replaceAssetClasses"
            >

                <div class="d-flex flex-wrap gap-2">
                    <template x-for="cls in assetClasses" :key="cls">
                        <div>
                            <input type="radio" class="btn-check" :id="`rmcls-${cls}`" name="Title" :value="cls" autocomplete="off">
                            <label class="btn btn-outline-light btn-sm" :for="`rmcls-${cls}`" x-text="cls"></label>
                        </div>
                    </template>
                </div>
                <button class="btn btn-danger mt-3" type="submit">Remove Asset Class</button>
            </form>
        </div>
    </div>
</div>
{{end}}
