<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{template "title" .}} - TDB</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <script src="//unpkg.com/alpinejs" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js"></script>

        <script src="https://unpkg.com/htmx-ext-alpine-interop@1.0.0/alpine-interop.js"></script>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <link rel="stylesheet" href="/assets/styles.css" />
        <link rel="stylesheet" href="/assets/custom-ui.css" />
        <style>[x-cloak]{display:none !important;}</style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary mb-2">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">TDB</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Navigation umschalten">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav gap-2">
                        <li class="nav-item"><a class="nav-link" href="/">Übersicht</a></li>
                        <li class="nav-item"><a class="nav-link" href="/add">Neuer Eintrag</a></li>
                        <li class="nav-item"><a class="nav-link" href="/settings">Einstellungen</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        {{ if .flash }}
        <div class="container mt-3">
            <div class="alert alert-{{ if .flashType }}{{ .flashType }}{{ else }}info{{ end }} alert-dismissible" role="alert">
                {{ .flash }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Schließen"></button>
            </div>
        </div>
        {{ end }}

        <main>
            {{template "content" .}}
        </main>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/fslightbox/3.0.9/index.min.js" integrity="sha512-03Ucfdj4I8Afv+9P/c9zkF4sBBGlf68zzr/MV+ClrqVCBXWAsTEjIoGCMqxhUxv1DGivK7Bm1IQd8iC4v7X2bw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script>
            // Aktiven Navigationslink anhand des aktuellen Pfads markieren.
            (function () {
                var path = location.pathname;
                document.querySelectorAll('.navbar .nav-link').forEach(function (a) {
                    var href = a.getAttribute('href');
                    var isActive = href === '/' ? path === '/' : path.indexOf(href) === 0;
                    if (isActive) {
                        a.classList.add('active');
                        a.setAttribute('aria-current', 'page');
                    }
                });
            })();
        </script>
    </body>
</html>
